# Mentor Mode Workflows
# ----------------------
# LoRA fine-tuning management and direct mentor-chat with individual
# C-suite agents.  Training jobs are tracked as knowledge-base documents
# so their status and logs persist across restarts.
#
# Mirrors: src/business_infinity/workflows/mentor.py

version: "5.0.0"
domain: mentor
description: >
  Mentor Mode workflows providing LoRA fine-tuning lifecycle management
  and direct one-on-one chat with individual C-suite agents.

workflows:

  - id: mentor-list-agents
    name: List Mentor-Mode Agents
    description: >
      List all agents in the catalog decorated with Mentor-Mode and LoRA
      metadata (version, capabilities, availability status).  Used by the
      Mentor Mode UI to populate the agent selector.
    type: query
    agents: []
    input: {}
    output:
      agents:
        type: array
        description: >
          List of agent objects augmented with lora_version, capabilities,
          and status fields.
      total:
        type: integer
        description: Total number of Mentor-Mode agents available.

  - id: mentor-chat
    name: Mentor Chat
    description: >
      Chat with a specific C-suite agent in Mentor Mode.
      Routes the message through the AOS SDK ask_agent call so the agent
      answers within the full boardroom context.
    type: query
    # agents: accepts any agent ID from the catalog; ceo, cfo, cmo, coo, cto, cso, chro
    # are the primary C-suite agents but any registered agent can be queried.
    agents: []
    input:
      agent_id:
        type: string
        required: true
        description: ID of the agent to chat with.
        example: "ceo"
      message:
        type: string
        required: true
        description: Message or question to send to the agent.
        example: "Explain your Q2 strategy."
      context:
        type: object
        required: false
        description: Optional structured context to include with the message.
    output:
      agent_id:
        type: string
      response:
        type: object
        description: Agent response returned by the AOS SDK ask_agent call.
      timestamp:
        type: string
        description: ISO-8601 timestamp of the response.
      system:
        type: string
        description: Always "mentor_mode".

  - id: mentor-fine-tune
    name: Start LoRA Fine-Tuning Job
    description: >
      Start a LoRA fine-tuning job for a C-suite agent using a specified
      training dataset.  Creates a training-job record in the knowledge base
      so the job can be tracked and its logs retrieved via mentor-training-logs.
    type: action
    agents: []
    input:
      agent_id:
        type: string
        required: true
        description: ID of the agent to fine-tune.
        example: "ceo"
      dataset_id:
        type: string
        required: true
        description: Identifier of the training dataset to use.
        example: "ds-q1-boardroom"
    output:
      job_id:
        type: string
        description: Unique training job identifier.
        example: "job_ceo_abc12345"
      agent_id:
        type: string
      dataset_id:
        type: string
      status:
        type: string
        description: Initial job status — always "queued" on creation.

  - id: mentor-training-logs
    name: Get Training Logs
    description: >
      Retrieve the log entries for a LoRA fine-tuning job.
      Fetches the job document from the knowledge base and returns its logs.
      Returns stub logs if the job document is not yet persisted.
    type: query
    agents: []
    depends_on:
      - mentor-fine-tune
    input:
      job_id:
        type: string
        required: true
        description: Training job identifier returned by mentor-fine-tune.
        example: "job_ceo_abc12345"
    output:
      job_id:
        type: string
      logs:
        type: array
        items: string
        description: Ordered list of log lines from the training job.

  - id: mentor-deploy-adapter
    name: Deploy LoRA Adapter
    description: >
      Deploy a trained LoRA adapter for a C-suite agent.
      Logs the deployment decision in the audit trail and marks the adapter
      version as active for the specified agent.
    type: action
    agents: []
    depends_on:
      - mentor-fine-tune
    input:
      agent_id:
        type: string
        required: true
        description: ID of the agent to deploy the adapter for.
        example: "ceo"
      version:
        type: string
        required: true
        description: Version string of the LoRA adapter to deploy.
        example: "v1.1.0"
      job_id:
        type: string
        required: false
        description: Training job ID that produced this adapter (for traceability).
        example: "job_ceo_abc12345"
    output:
      success:
        type: boolean
      agent_id:
        type: string
      version:
        type: string
      deployed_at:
        type: string
        description: ISO-8601 timestamp of the deployment.
