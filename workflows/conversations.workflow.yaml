# Boardroom Conversation Workflows
# ----------------------------------
# Manage boardroom conversations and Agent-to-Agent (A2A) messaging.
# Conversations are persisted as knowledge-base documents and orchestrated
# via the AOS infrastructure service.
#
# Mirrors: src/business_infinity/workflows/conversations.py

version: "5.0.0"
domain: conversations
description: >
  Boardroom conversation and A2A messaging workflows.
  AOS manages agent lifecycle, messaging, storage, and monitoring;
  the client supplies only business context.

workflows:

  - id: list-conversations
    name: List Boardroom Conversations
    description: >
      List boardroom conversations stored in the knowledge base, with optional
      filtering by champion and status.  Conversations are persisted as
      knowledge-base documents so they survive AOS restarts.
    type: query
    agents: []
    input:
      champion:
        type: string
        required: false
        description: Filter conversations by champion agent ID.
        example: "ceo"
      status:
        type: string
        required: false
        description: Filter conversations by status (open, closed, etc.).
        example: "open"
      limit:
        type: integer
        default: 50
        description: Maximum number of conversations to return.
    output:
      conversations:
        type: array
        description: List of conversation document objects.
      count:
        type: integer
        description: Total number of conversations returned.

  - id: create-conversation
    name: Create Boardroom Conversation
    description: >
      Create and start a new boardroom conversation via AOS orchestration.
      The champion agent leads the discussion; all relevant C-suite agents
      participate collaboratively.  AOS manages the full agent lifecycle.
    # type is "action" because the workflow creates/starts a collaborative
    # AOS orchestration and returns a conversation_id; it is not itself
    # a perpetual background session.
    type: action
    workflow_mode: collaborative
    agents:
      - ceo
      - cfo
      - cmo
      - coo
      - cto
      - cso
      - chro
    input:
      conversation_type:
        type: string
        required: true
        description: Type/category of the boardroom conversation.
        example: "strategic-decision"
      champion:
        type: string
        required: true
        description: Agent ID of the conversation champion (leads the discussion).
        example: "ceo"
      title:
        type: string
        required: true
        description: Human-readable title of the conversation.
        example: "Q2 Market Expansion"
      content:
        type: string
        required: true
        description: Initial content or proposal text for the conversation.
        example: "Proposal to expand into APAC markets in Q2..."
      context:
        type: object
        required: false
        description: Additional structured context for the conversation.
        example: {}
    output:
      conversation_id:
        type: string
        description: Orchestration ID used as the conversation identifier.
      status:
        type: string
        description: Initial orchestration status.
      message:
        type: string
        description: Confirmation message.

  - id: sign-conversation
    name: Sign Boardroom Conversation
    description: >
      Append a digital signature to a boardroom conversation document.
      Records the signer's role, name, and timestamp in the knowledge base.
    type: action
    agents: []
    input:
      conversation_id:
        type: string
        required: true
        description: Knowledge-base document ID of the conversation to sign.
        example: "doc-abc12345"
      signer_role:
        type: string
        required: true
        description: C-suite role of the signer (e.g. cfo, ceo).
        example: "cfo"
      signer_name:
        type: string
        required: true
        description: Full name of the signer.
        example: "Jane Smith"
    output:
      conversation_id:
        type: string
      status:
        type: string
        description: "signed"
      signer:
        type: object
        description: Object containing name and role of the signer.

  - id: create-a2a-message
    name: Create Agent-to-Agent Message
    description: >
      Initiate an Agent-to-Agent (A2A) communication via AOS orchestration.
      The from_agent sends a message to the to_agent; AOS handles the full
      interaction lifecycle as a sequential orchestration.
    # type is "action" because the workflow creates/starts a sequential AOS
    # orchestration and returns a conversation_id; it is not itself a perpetual
    # background session.
    type: action
    workflow_mode: sequential
    agents:
      - from_agent
      - to_agent
    input:
      from_agent:
        type: string
        required: true
        description: Agent ID of the sending agent.
        example: "ceo"
      to_agent:
        type: string
        required: true
        description: Agent ID of the receiving agent.
        example: "cfo"
      conversation_type:
        type: string
        required: true
        description: Purpose/type of the A2A message.
        example: "budget-query"
      message:
        type: string
        required: true
        description: Message text (capped at 240 chars in orchestration purpose; full text in context).
        example: "What is the runway at current burn rate?"
      context:
        type: object
        required: false
        description: Additional structured context passed to the orchestration.
        example: {}
    output:
      conversation_id:
        type: string
        description: Orchestration ID of the A2A interaction.
      from_agent:
        type: string
      to_agent:
        type: string
      status:
        type: string

  - id: get-conversation-events
    name: Get Conversation Events
    description: >
      Get recent boardroom conversation events from the knowledge base.
      Supports incremental polling by optionally filtering events created
      after a given ISO-8601 timestamp.
    type: query
    agents: []
    input:
      since:
        type: string
        required: false
        description: ISO-8601 timestamp; return only events after this time.
        example: "2026-01-01T00:00:00Z"
      limit:
        type: integer
        default: 100
        description: Maximum number of events to return.
    output:
      events:
        type: array
        description: List of conversation event documents.
      count:
        type: integer
      since:
        type: string
        description: Echo of the since filter provided in the request.
      timestamp:
        type: string
        description: ISO-8601 timestamp of when the response was generated.
