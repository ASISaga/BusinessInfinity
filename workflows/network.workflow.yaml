# Global Boardroom Network Workflows
# ------------------------------------
# Handles Global Boardroom Network membership, peer discovery, negotiations,
# and agreement signing.  Negotiation records are persisted in the knowledge
# base; join and sign decisions are logged in the audit trail.
#
# Mirrors: src/business_infinity/workflows/network.py

version: "5.0.0"
domain: network
description: >
  Global Boardroom Network workflows for joining the network, discovering
  peer boardrooms, creating negotiations, and signing agreements.

workflows:

  - id: network-status
    name: Network Status
    description: >
      Get the current network node status for this BusinessInfinity instance.
      Returns local node identity, the number of active agents, and aggregate
      network statistics.
    type: query
    agents: []
    input: {}
    output:
      local_node:
        type: object
        description: >
          Identity and status of this BusinessInfinity node, including id,
          status, agents_active count, and capabilities list.
      network_stats:
        type: object
        description: Aggregate network statistics including active agents and last_updated timestamp.

  - id: join-network
    name: Join Global Boardroom Network
    description: >
      Join the Global Boardroom Network using LinkedIn verification.
      Calls the SDK network join API (v5.0.0 Covenant-Based Federation) and
      logs the membership decision in the audit trail.
    type: action
    agents:
      - ceo
    input:
      linkedin_url:
        type: string
        required: true
        description: LinkedIn company page URL used for identity verification.
        example: "https://linkedin.com/company/example"
      company_name:
        type: string
        required: false
        description: Company name for display in the network.
        example: "Example Corp"
      covenant_id:
        type: string
        required: false
        description: ID of the covenant to accept on joining.
        example: "cov-ethics-001"
    output:
      node_id:
        type: string
        description: Assigned network node identifier.
      company_name:
        type: string
      verified:
        type: boolean
        description: Whether LinkedIn identity was verified.
      joined_at:
        type: string
        description: ISO-8601 timestamp of network admission.

  - id: discover-boardrooms
    name: Discover Peer Boardrooms
    description: >
      Discover peer boardrooms in the Global Boardroom Network.
      Uses the SDK peer discovery API (v5.0.0) to find matching nodes,
      optionally filtered by industry and location.
    type: query
    agents: []
    input:
      industry:
        type: string
        required: false
        description: Filter peers by industry sector.
        example: "Technology"
      location:
        type: string
        required: false
        description: Filter peers by geographic location.
        example: "San Francisco"
      max_results:
        type: integer
        default: 20
        description: Maximum number of peer boardrooms to return.
    output:
      boardrooms:
        type: array
        description: List of discovered peer boardroom node objects.
      total_found:
        type: integer
        description: Total number of matching peers discovered.
      query:
        type: object
        description: Echo of the industry and location filters applied.

  - id: create-negotiation
    name: Create Negotiation
    description: >
      Create a negotiation record with a peer boardroom.
      Stores the negotiation document in the knowledge base so it can be
      tracked and progressed through to a full covenant or agreement.
    type: action
    agents: []
    input:
      title:
        type: string
        required: true
        description: Title describing the negotiation.
        example: "AI Partnership Agreement"
      description:
        type: string
        required: false
        description: Detailed description of the negotiation scope.
        example: "Collaboration on AI research"
      type:
        type: string
        required: true
        description: Negotiation type (e.g. partnership, licensing, supply).
        example: "partnership"
      target_enterprise:
        type: string
        required: true
        description: Name of the target organisation to negotiate with.
        example: "Tech Innovations Inc"
    output:
      negotiation_id:
        type: string
        description: Unique identifier of the created negotiation record.
        example: "neg_abc12345"
      status:
        type: string
        description: Initial status — always "active" on creation.
      message:
        type: string
        description: Confirmation message.

  - id: sign-agreement
    name: Sign Agreement
    description: >
      Sign a business agreement or covenant with a peer boardroom.
      Uses the SDK sign_covenant API (when available) and records the
      signature decision in the audit trail.
    type: action
    agents:
      - ceo
    depends_on:
      - create-negotiation
    input:
      agreement_id:
        type: string
        required: true
        description: Identifier of the agreement to sign.
        example: "agr_abc12345"
      signer_role:
        type: string
        required: true
        description: C-suite role of the signatory.
        example: "ceo"
      covenant_id:
        type: string
        required: false
        description: Covenant ID to sign via the SDK sign_covenant API.
        example: "cov-001"
    output:
      success:
        type: boolean
      agreement_id:
        type: string
      signer_role:
        type: string
      signed_at:
        type: string
        description: ISO-8601 timestamp of the signature.
